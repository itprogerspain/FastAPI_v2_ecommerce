# upstream block defines the backend server pool.
# Using a named upstream makes it easy to add more backend instances later
# (e.g. for load balancing across multiple containers).
upstream fastapi_ecommerce {
    server backend:8000;
}

server {
    listen 80;
    server_name localhost;

    # ----------------------------------------------------------
    # Media files — served directly by nginx.
    # Bypasses Python entirely: much faster for static content.
    # Files are written by the backend/worker into the shared media volume.
    # ----------------------------------------------------------
    location /media/ {
        alias /app/backend/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ----------------------------------------------------------
    # All other requests — proxied to the FastAPI backend.
    # http_upgrade and Connection "upgrade" enable WebSocket support
    # for /ws/* endpoints (order status, notifications, chat, etc.).
    # ----------------------------------------------------------
    location / {
        proxy_pass http://fastapi_ecommerce;

        # Disable automatic redirects — FastAPI handles them itself
        proxy_redirect off;

        # Forward real client info so FastAPI sees the original IP and protocol
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade headers — required for ws:// connections
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Increase timeout for long-lived WebSocket connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
