<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; color: #333; max-width: 600px; margin: auto; padding: 20px; }
        h1 { color: #2196F3; }
        .status-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-weight: bold;
                        background: #e3f2fd; color: #1565C0; font-size: 16px; margin: 10px 0; }
        .order-info { background: #f9f9f9; padding: 16px; border-radius: 8px; margin: 20px 0; }
        .footer { margin-top: 30px; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <h1>Order Status Update</h1>
    <p>Hello, <strong>{{ user_name }}</strong>!</p>
    <p>Your order status has been updated:</p>

    <div class="order-info">
        <p><strong>Order #:</strong> {{ order_id }}</p>
        <p><strong>New status:</strong> <span class="status-badge">{{ new_status }}</span></p>
    </div>

    <p>If you have any questions, please contact our support team.</p>

    <div class="footer">
        <p>This is an automated message, please do not reply to this email.</p>
    </div>
</body>
</html>
